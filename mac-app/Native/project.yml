name: Vault
options:
  bundleIdPrefix: com.jinxcatstudio
  deploymentTarget:
    macOS: "13.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  Vault:
    type: application
    platform: macOS
    sources:
      - path: Vault/App
      - path: Vault/Bridge
      - path: Vault/Handlers
      - path: Vault/Database
      - path: Vault/Models
      - path: Vault/DTO
      - path: Vault/Repositories
      - path: Vault/Services
      - path: Vault/Resources/web
        type: folder
        buildPhase: resources
      - path: Vault/Resources/schema
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jinxcatstudio.vault
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: Vault/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    dependencies:
      - sdk: libsqlite3.tbd

  VaultTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VaultTests
    dependencies:
      - target: Vault
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
