<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vault</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <app-shell id="app"></app-shell>

  <script>
    // Bridge callback registry — called by native Swift layer
    window.__pendingBridgeCalls = new Map();

    window.__bridgeCallback = function(id, jsonString) {
      const pending = window.__pendingBridgeCalls.get(id);
      if (!pending) return;
      window.__pendingBridgeCalls.delete(id);
      try {
        const response = JSON.parse(jsonString);
        if (response.success) {
          pending.resolve(response.data);
        } else {
          pending.reject(response.error || { code: 'UNKNOWN', message: 'Unknown error' });
        }
      } catch (e) {
        pending.reject({ code: 'ENCODING_ERROR', message: 'Failed to parse response: ' + e.message });
      }
    };

    // Base64-encoded callback (preferred, avoids escaping issues)
    window.__bridgeCallbackB64 = function(id, base64String) {
      try {
        const jsonString = atob(base64String);
        window.__bridgeCallback(id, jsonString);
      } catch (e) {
        const pending = window.__pendingBridgeCalls.get(id);
        if (pending) {
          window.__pendingBridgeCalls.delete(id);
          pending.reject({ code: 'ENCODING_ERROR', message: 'Failed to decode base64 response: ' + e.message });
        }
      }
    };
  </script>
  <script src="app.js" type="module"></script>
</body>
</html>
