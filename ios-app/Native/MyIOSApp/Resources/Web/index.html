  <app-shell></app-shell>
  <script>
    // Debug overlay — catches JS errors and displays them on screen.
    // Remove before shipping.
    window.addEventListener('error', function(e) {
      showError(e.message + '\n' + (e.filename || '') + ':' + e.lineno);
    });
    window.addEventListener('unhandledrejection', function(e) {
      showError('Unhandled promise rejection:\n' + (e.reason?.stack || e.reason));
    });
    function showError(msg) {
      var el = document.getElementById('__debug_overlay');
      if (!el) {
        el = document.createElement('div');
        el.id = '__debug_overlay';
        el.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#1c1c1e;color:#ff453a;' +
          'font:13px/1.5 monospace;padding:20px;overflow:auto;z-index:99999;white-space:pre-wrap;';
        el.innerHTML = '<strong>JS Error</strong>\n\n';
        document.body.appendChild(el);
      }
      el.textContent += msg + '\n\n';
    }
  </script>
</body>
