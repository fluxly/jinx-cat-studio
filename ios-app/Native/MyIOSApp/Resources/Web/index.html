<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Utility App</title>
  <script src="./bundle.js"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <app-shell></app-shell>
  <script>
    window.addEventListener('error', function(e) {
      showDebug('ERROR: ' + e.message + '\n' + (e.filename || '') + ':' + e.lineno);
    });
    window.addEventListener('unhandledrejection', function(e) {
      showDebug('REJECTION: ' + (e.reason?.stack || e.reason));
    });
    // Runs after module scripts execute — reports component state to console and screen
    window.addEventListener('load', function() {
      var defined = !!customElements.get('app-shell');
      var el = document.querySelector('app-shell');
      var children = el ? el.childElementCount : -1;
      var snippet = el ? el.innerHTML.trim().substring(0, 200) : 'N/A';
      var msg = 'app-shell defined: ' + defined + '\n'
              + 'app-shell childCount: ' + children + '\n'
              + 'innerHTML[0:200]: ' + snippet;
      console.log('[DIAG]\n' + msg);
      if (!defined || children === 0) showDebug(msg);
    });
    function showDebug(msg) {
      var el = document.getElementById('__debug');
      if (!el) {
        el = document.createElement('pre');
        el.id = '__debug';
        el.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#1c1c1e;color:#fff;'
          + 'font:12px/1.5 monospace;padding:20px;overflow:auto;z-index:99999;margin:0;';
        document.body.appendChild(el);
      }
      el.textContent += msg + '\n\n';
    }
  </script>
</body>
</html>
